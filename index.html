<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>8090年代回忆杀</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 首页 -->
    <div id="page-home" class="page active">
      <header class="header">
        <h1>🎬 8090年代回忆杀</h1>
        <p class="subtitle">回味经典 重温美好</p>
      </header>
      
      <!-- 大按钮导航 -->
      <div class="nav-buttons">
        <button class="nav-btn" onclick="router.go('today')">
          <span class="nav-btn-icon">📅</span>
          <div class="nav-btn-text">
            <span class="nav-btn-title">今日推荐</span>
            <span class="nav-btn-desc">今天为你推荐Ta</span>
          </div>
        </button>
        
        <button class="nav-btn" onclick="router.go('list')">
          <span class="nav-btn-icon">👥</span>
          <div class="nav-btn-text">
            <span class="nav-btn-title">明星目录</span>
            <span class="nav-btn-desc">查看所有明星</span>
          </div>
        </button>
        
        <button class="nav-btn" onclick="router.go('topic')">
          <span class="nav-btn-icon">📚</span>
          <div class="nav-btn-text">
            <span class="nav-btn-title">专题精选</span>
            <span class="nav-btn-desc">四大天王 港台女神</span>
          </div>
        </button>
        
        <button class="nav-btn" onclick="router.go('favorite')">
          <span class="nav-btn-icon">❤️</span>
          <div class="nav-btn-text">
            <span class="nav-btn-title">我的收藏</span>
            <span class="nav-btn-desc">收藏喜欢的明星</span>
          </div>
        </button>
      </div>
      
      <!-- 今日推荐 -->
      <div class="today-recommend" id="today-recommend">
        <!-- JS 渲染 -->
      </div>
    </div>

    <!-- 明星列表页 -->
    <div id="page-list" class="page">
      <header class="header">
        <h1>👥 明星目录</h1>
      </header>
      
      <!-- 搜索框 -->
      <div class="search-box">
        <input class="search-input" type="text" placeholder="搜索明星名字..." id="search-input">
      </div>
      
      <!-- 分类标签 -->
      <div class="tabs">
        <button class="tab active" data-type="all">全部</button>
        <button class="tab" data-type="singer">歌手</button>
        <button class="tab" data-type="actor">演员</button>
      </div>
      
      <!-- 列表 -->
      <div class="star-list" id="star-list">
        <!-- JS 渲染 -->
      </div>
    </div>

    <!-- 详情页 -->
    <div id="page-detail" class="page">
      <div class="detail-header">
        <button class="back-btn" onclick="router.back()">← 返回</button>
      </div>
      <div class="detail-content" id="detail-content">
        <!-- JS 渲染 -->
      </div>
    </div>

    <!-- 专题页 -->
    <div id="page-topic" class="page">
      <header class="header">
        <h1>📚 专题精选</h1>
      </header>
      <div class="topic-list" id="topic-content">
        <!-- JS 渲染 -->
      </div>
    </div>

    <!-- 我的收藏 -->
    <div id="page-favorite" class="page">
      <header class="header">
        <h1>❤️ 我的收藏</h1>
      </header>
      <div class="star-list" id="favorite-list">
        <!-- JS 渲染 -->
      </div>
    </div>
    
    <!-- 今日推荐详情页 -->
    <div id="page-today" class="page">
      <div class="detail-header">
        <button class="back-btn" onclick="router.back()">← 返回</button>
      </div>
      <div class="detail-content" id="today-content">
        <!-- JS 渲染 -->
      </div>
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-page="home">
        <span class="nav-icon">🏠</span>
        <span>首页</span>
      </button>
      <button class="nav-item" data-page="list">
        <span class="nav-icon">👥</span>
        <span>明星</span>
      </button>
      <button class="nav-item" data-page="topic">
        <span class="nav-icon">📚</span>
        <span>专题</span>
      </button>
      <button class="nav-item" data-page="favorite">
        <span class="nav-icon">❤️</span>
        <span>收藏</span>
      </button>
    </nav>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
